# TALOS Otonom Sürüş - Tam Sistem Docker Compose
# Kullanım:
#   1. ./setup-vcan.sh          (vcan0 + X11, bir kez çalıştır)
#   2. docker compose up        (tüm sistemi başlat)
#   3. docker compose --profile gui up  (can-visualizer dahil)
#
# Geliştirme: Python dosyasını düzenle → docker compose restart <servis>
# Rebuild:    docker compose build talos-controller
#
# L1 Loglama (KTR §9.14.2): json-file 10 MB × 5 = 50 MB/servis varsayılan.
# Yeni servisler `<<: *log-defaults` ile devralır.
#
# OTO-RESTART (2026-07-15): Her servis `restart: "on-failure:5"` — container
# HATA ile (non-zero exit / çökme) kapanırsa Docker daemon onu en fazla 5 kez
# otomatik yeniden başlatır, sonra vazgeçip `exited` bırakır (crash-loop
# thrashing'i önler). Temiz çıkış (exit 0) veya `docker compose down` restart
# TETİKLEMEZ. Restart olayları baslat.sh'taki gözcü tarafından
# logs/$RUN_ID/system/watchdog.log'a yazılır + terminale uyarı basılır.
# GÜVENLİK NOTU: Sim (CartPlugin) gaz-watchdog'u YOK → talos-controller /
# can-bridge / state-bridge çökerse yeniden ayağa kalkana dek araç son gazla
# süzülebilir. Gözcü bu tier'ın restartını ayrıca KIRMIZI uyarıyla işaretler.

x-log-defaults: &log-defaults
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Tüm servisler için ortak env (yarı uygulamayı kaldırır — M2)
# ROS_MASTER_URI/ROS_IP host env'inden override edilebilir (gerçek araçta master
# araç PC'sindeyse: ROS_MASTER_URI=http://<arac_ip>:11311 ROS_IP=<laptop_ip> ./baslat.sh)
x-talos-env: &talos-env
  ROS_MASTER_URI: ${ROS_MASTER_URI:-http://localhost:11311}
  RUN_ID: ${RUN_ID:-dev}
  TALOS_LOG_ROOT: /app/logs

# Tüm servisler için ortak mount'lar (talos_common + per-run logs)
x-talos-mounts: &talos-mounts
  - ./talos_common:/app/talos_common:ro
  - ./logs:/app/logs

services:

  # =========================================================
  # KONUM SERVISI
  # =========================================================
  konum-server:
    image: talos-all:latest
    container_name: konum-server
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./konum/konum.py:/app/konum.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && export PYTHONPATH=/app:$$PYTHONPATH && python3 -u /app/konum.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # HARITA + WAYPOINT SERVISI (tek imaj: talos-all)
  # =========================================================
  # Kerem'in eski prebuilt talos-map-server imajindan KURTULDUK (2026-06-22).
  # Artik talos-all (+ ros-noetic-map-server) calistirir:
  #   rosrun map_server map_server /app/my_map.yaml  -> /map (occupancy grid)
  #   python3 waypoint_pub.py                          -> /waypoint (graf markerlari)
  # Graf GUNCEL: maps/final_graph.yaml, hedef_yoneticisi.build_track_graph'tan uretildi
  # (644 node; gen_track_graph.py ile yenilenir). Eski 60-node final_graph artik yok.
  talos-map-server:
    image: talos-all:latest
    container_name: talos-map-server
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./maps/my_map.yaml:/app/my_map.yaml:ro
      - ./maps/my_map.pgm:/app/my_map.pgm:ro
      - ./maps/final_graph.yaml:/app/final_graph.yaml:ro
      - ./maps/waypoint_pub.py:/app/waypoint_pub.py:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && (rosrun map_server map_server /app/my_map.yaml &) && sleep 2 && python3 -u /app/waypoint_pub.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # HEDEF TESLIMI (matplotlib GUI)
  # =========================================================
  hedef-teslimi:
    image: talos-all:latest
    container_name: hedef_teslimi
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
      # Kalıcı tanı logu kökü → ./logs/$RUN_ID/hedef/ (diğer servislerle aynı ağaç).
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./hedef/hedef_yoneticisi.py:/app/hedef_yoneticisi.py:ro
      - ./hedef/hedef_logger.py:/app/hedef_logger.py:ro
      # Canlı parametre altyapısı: config/canli_params.yaml host'ta düzenlenir,
      # restart'sız uygulanır (talos_common/canli_params.py izler).
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      # Diğer servislerle AYNI log ağacı → ./logs/$RUN_ID/hedef/ (engel/karar/
      # system ile yan yana). Logger zaten $RUN_ID/hedef alt dizini açar.
      - ./logs:/app/logs
      - ./missions:/missions:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/hedef_yoneticisi.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # ENGEL ALGILAMA (GPU)
  # =========================================================
  engel-node:
    image: talos-all:latest
    container_name: engel-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./lidar/engel_node_fixed.py:/app/engel_node_fixed.py:ro
      - ./lidar/pointcloud_obstacle_publisher.py:/app/pointcloud_obstacle_publisher.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    # talos-all imajinda pointcloud_to_laserscan apt ile /opt/ros/noetic altinda gelir
    # (eski otonom-arac imajindaki /root/catkin_ws degil). Parent bash ROS env + PYTHONPATH
    # export eder, sonra background job'lar fork edilir → tum subshell'ler ayni env'i
    # (Decision.msg dahil) miras alir.
    entrypoint: bash
    # FIX(menzil): _min_height -1.2 → -0.7. Velodyne yerden ~1.0m; -1.2 zemin
    # düzleminin ALTINDA olduğu için laserscan tüm zemin noktalarını yutuyordu →
    # her yönde sabit ~3.3m "hayalet halka" (VLP en alt ışını zemini ~3.3m'de
    # kesiyor). Halka 3m engel eşiğinin hemen üstünde durduğundan engel ancak
    # <3m'ye girince ortaya çıkıyor, ~1m uyarı kalıyordu → geç tepki/çarpma.
    # -0.7 (yerden ~0.3m üstü) zemini eler, cone'u gerçek menzilinde (10-20m)
    # görünür kılar. Cone/duba >0.3m olduğu için korunur.
    # NOT: Aşağıdaki '>-' katlanmış blok TEK satıra iner — içine '#' yorum KOYMA,
    # sonraki her şeyi (rosrun dahil) yorum yapar ve node komutsuz kalır.
    command:
      - -c
      - >-
        set -e;
        source /opt/ros/noetic/setup.bash;
        export PYTHONPATH=/talos-devel/lib/python3/dist-packages:/app:$$PYTHONPATH;
        (rosrun pointcloud_to_laserscan pointcloud_to_laserscan_node cloud_in:=/cart/center_laser/scan scan:=/converted_scan _min_height:=-0.7 _max_height:=1.0 _range_min:=0.45 _range_max:=100.0 &);
        sleep 2;
        (stdbuf -oL python3 -u /app/engel_node_fixed.py &);
        stdbuf -oL python3 -u /app/pointcloud_obstacle_publisher.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # TRAFIK ISARETI ALGILAMA (GPU)
  # =========================================================
  traffic-node:
    image: talos-all:latest
    container_name: traffic-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # Araç internetsiz: ultralytics'in her import'taki DNS yoklamasını kapat
      # (deterministik hızlı başlangıç; DNS kara-delik senaryosunda saniyeler kazandırır)
      - YOLO_OFFLINE=true
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./algi/levha/yolov8_ros_node_fixed.py:/app/yolov8_ros_node_fixed.py:ro
      # Levha modeli: İndirilenler'deki yolov10n best.pt (26 sınıf) image içindeki modeli ezer
      - ./algi/levha/yolov8_ros/scripts/best.pt:/root/catkin_ws/src/yolov8_ros/scripts/best.pt:ro
      # Canlı parametreler (restart'sız ayar)
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      # 'Levha Tespit' cv2 penceresi icin X11 (lane-follower ile ayni kalip)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/yolov8_ros_node_fixed.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # PARK + DURAK ALANI TESPITI (HSV mavi-renk, GPU gerekmez)
  # MODELLER 20.06.2026/PARK ALANI VE DURAK ALANI -> fixes/park_durak_node.py
  # Cikti: /park_alani, /durak_alani (String) + /park_durak/image_annotated
  # =========================================================
  park-durak-node:
    image: talos-all:latest
    container_name: park-durak-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./algi/park_durak/park_durak_node.py:/app/park_durak_node.py:ro
      # Canlı parametreler (restart'sız ayar)
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      # 'Park/Durak Tespit' cv2 penceresi icin X11 (traffic-node ile ayni kalip)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/park_durak_node.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # SERIT TAKIP / LANE FOLLOWER (YOLOv8, GPU)
  # lane/scripts/lane_follow_node.py -> /line (direksiyon acisi) + /lane/* topic'leri
  # control.py /line'i tuketir (LINE_TOPIC, 12 derece altinda gated duzeltme).
  # Kamera: /cart/front_camera/image_raw/compressed
  # =========================================================
  lane-follower:
    image: talos-all:latest
    container_name: lane-follower
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # Araç internetsiz: ultralytics'in her import'taki DNS yoklamasını kapat
      # (deterministik hızlı başlangıç; DNS kara-delik senaryosunda saniyeler kazandırır)
      - YOLO_OFFLINE=true
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      # current_dir=/app -> model_candidates[1] = /app/models/best.pt eslesir
      # fixes/ override: /lane/image_annotated publisher + DISPLAY guard eklenmis surum
      - ./algi/serit/lane_follow_node_fixed.py:/app/lane_follow_node.py:ro
      - ./algi/serit/models/best.pt:/app/models/best.pt:ro
      # Canlı parametreler (restart'sız ayar)
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      # 'Lane Follow' cv2 penceresi icin X11 (traffic-node ile ayni kalip)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/lane_follow_node.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # YAYA GECIDI / CROSSWALK (YOLOv8 ADANMIS MODEL, GPU)
  # MODELLER 20.06.2026/YAYA GEÇİDİ/best.pt ({0:crosswalk,1:object})
  # -> /yaya_gecidi/image_annotated + /yaya_gecidi/model
  # traffic-node'un bare /yaya_gecidi'sini (karar.py tuketir) EZMEZ.
  # =========================================================
  yaya-gecidi-node:
    image: talos-all:latest
    container_name: yaya-gecidi-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # Araç internetsiz: ultralytics'in her import'taki DNS yoklamasını kapat
      # (deterministik hızlı başlangıç; DNS kara-delik senaryosunda saniyeler kazandırır)
      - YOLO_OFFLINE=true
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./algi/yaya_gecidi/yaya_gecidi_node.py:/app/yaya_gecidi_node.py:ro
      - ./algi/yaya_gecidi/best.pt:/app/models/best.pt:ro
      # Canlı parametreler (restart'sız ayar)
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/yaya_gecidi_node.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # KARAR DUGUMU (Behavior Tree — karar_bt/)
  # Eski fixes/karar.py git'te kalir; geri donus icin sadece bu blogu revert et.
  # talos-all imaji py_trees icerir; ayri karar-bt imaji gerekmez (tek imaj).
  # =========================================================
  karar-node:
    image: talos-all:latest
    container_name: karar-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      # NOT: /app salt-okunur. ./talos_common'ı /app/talos_common'a mount edebilmek
      # için mountpoint'in ÖNCEDEN var olması şart (yoksa Docker ro fs'te mkdir
      # yapamayıp "read-only file system" ile container'ı düşürür → karar-node hiç
      # başlamaz, /karar yayınlanmazdı). Mountpoint karar_bt/talos_common/.gitkeep
      # ile kalıcı sağlanıyor; ./talos_common bunun üzerine bindirilir.
      - ./karar:/app:ro
      - ./talos_common:/app/talos_common:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && export PYTHONPATH=/talos-devel/lib/python3/dist-packages:/app:$$PYTHONPATH && python3 -u /app/karar_bt_node.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # CAN -> GAZEBO KOPRUSU
  # talos-all:latest kullanir (python-can + rospy)
  # ~/talos-sim/devel mount'u cart_sim.msg icin gerekli
  # =========================================================
  can-bridge:
    image: talos-all:latest
    container_name: talos-can-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages:/app
      # Gaz gücü/rampa — host env'inden geçer. Default 1.0 (urdf motor torku
      # artık gerçekçi, yapay 0.1 tavanı kalktı; env ile hâlâ kısılabilir).
      - TALOS_POWER_LIMIT=${TALOS_POWER_LIMIT:-1.0}
      # Otonom devralınca (0x500=1) kullanılacak güç limiti.
      - TALOS_POWER_LIMIT_AUTO=${TALOS_POWER_LIMIT_AUTO:-1.0}
      - TALOS_RAMP_UP=${TALOS_RAMP_UP:-0.02}
      - TALOS_RAMP_DOWN=${TALOS_RAMP_DOWN:-0.05}
    volumes:
      - ./control/can_to_talos_cart.py:/app/can_to_talos_cart.py:ro
      - ./control/can_decoder.py:/app/can_decoder.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/can_to_talos_cart.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # GAZEBO -> CAN KOPRUSU
  # =========================================================
  state-bridge:
    image: talos-all:latest
    container_name: talos-state-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages:/app
    volumes:
      - ./control/talos_state_to_can.py:/app/talos_state_to_can.py:ro
      - ./control/can_decoder.py:/app/can_decoder.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/talos_state_to_can.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # TALOS KONTROLCU (ana kontrol, build edilebilir)
  # =========================================================
  talos-controller:
    image: talos-all:latest
    container_name: talos-controller
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
      # manuel_baslat.sh=1: idle başla (bus serbest), buton 1 ile devral. baslat.sh: 0.
      - TALOS_BUS_RELEASE_ON_START=${TALOS_BUS_RELEASE_ON_START:-0}
    volumes:
      - ./control/control.py:/app/control.py:ro
      - ./control/ackermann.py:/app/ackermann.py:ro
      - ./control/logs:/app/logs
      - ./talos_common:/app/talos_common:ro
      - ./config:/app/config:ro
      - ./missions:/missions:ro   # FIX 2 — GOREV_NOKTALARI GeoJSON yükleme
      # cart_sim.msg (Decision): /karar_decision reason alanı — engel-DUR
      # kaçış filtresi (P0 №1, inceleme 2026-07-16). Mount yoksa control
      # fallback'e düşer (kaçış kapalı), ama normal sürüş etkilenmez.
      - ~/talos-sim/devel:/talos-devel:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && export PYTHONPATH=/talos-devel/lib/python3/dist-packages:$$PYTHONPATH && cd /app && python3 -u control.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # =========================================================
  # CAN GORSELLESTIRICI (opsiyonel, --profile gui ile)
  # =========================================================
  can-visualizer:
    profiles: [gui]
    image: talos-all:latest
    container_name: talos-can-visualizer
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages
    volumes:
      - ./control/can_visualizer.py:/app/can_visualizer.py:ro
      - ./control/can_decoder.py:/app/can_decoder.py:ro
      - ./missions:/missions:ro
      - ./maps:/maps:ro
      - ~/talos-sim/devel:/talos-devel:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/can_visualizer.py"
    logging: *log-defaults
    restart: "on-failure:5"
