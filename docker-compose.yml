# TALOS Otonom Sürüş - Tam Sistem Docker Compose
# Kullanım:
#   1. ./setup-vcan.sh          (vcan0 + X11, bir kez çalıştır)
#   2. docker compose up        (tüm sistemi başlat)
#   3. docker compose --profile gui up  (can-visualizer dahil)
#
# Geliştirme: Python dosyasını düzenle → docker compose restart <servis>
# Rebuild:    docker compose build talos-controller
#
# L1 Loglama (KTR §9.14.2): json-file 10 MB × 5 = 50 MB/servis varsayılan.
# Yeni servisler `<<: *log-defaults` ile devralır.

x-log-defaults: &log-defaults
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Tüm servisler için ortak env (yarı uygulamayı kaldırır — M2)
x-talos-env: &talos-env
  ROS_MASTER_URI: http://localhost:11311
  RUN_ID: ${RUN_ID:-dev}
  TALOS_LOG_ROOT: /app/logs

# Tüm servisler için ortak mount'lar (talos_common + per-run logs)
x-talos-mounts: &talos-mounts
  - ./talos_common:/app/talos_common:ro
  - ./logs:/app/logs

services:

  # =========================================================
  # KONUM SERVISI
  # =========================================================
  konum-server:
    image: talos-all:latest
    container_name: konum-server
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./fixes/konum.py:/app/konum.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./logs:/app/logs
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && export PYTHONPATH=/app:$$PYTHONPATH && python3 -u /app/konum.py"
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # HARITA + WAYPOINT SERVISI
  # =========================================================
  # Eski hazir imaj: hem map_server (/map, my_map.yaml) hem waypoint_pub
  # (/waypoint, gomulu final_graph.yaml — CUSTOM_EDGES ile uyumlu eski sema)
  # calistirir. hedef_yoneticisi.py /map gelmeden cizim yapmaz; talos-all'a
  # gecis map_server'i dusurdugu icin GUI bos kaliyordu. Yeni graph yapisi
  # ekipten gelince tek-imaj (talos-all + ros-noetic-map-server) donusu yapilacak.
  talos-map-server:
    image: talos-map-server:latest
    container_name: talos-map-server
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./fixes/waypoint_pub.py:/app/waypoint_pub.py:ro
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # HEDEF TESLIMI (matplotlib GUI)
  # =========================================================
  hedef-teslimi:
    image: talos-all:latest
    container_name: hedef_teslimi
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./fixes/hedef_yoneticisi.py:/app/hedef_yoneticisi.py:ro
      - ./missions:/missions:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/hedef_yoneticisi.py"
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # ENGEL ALGILAMA (GPU)
  # =========================================================
  engel-node:
    image: talos-all:latest
    container_name: engel-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./fixes/engel_node_fixed.py:/app/engel_node_fixed.py:ro
      - ./fixes/pointcloud_obstacle_publisher.py:/app/pointcloud_obstacle_publisher.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    # talos-all imajinda pointcloud_to_laserscan apt ile /opt/ros/noetic altinda gelir
    # (eski otonom-arac imajindaki /root/catkin_ws degil). Parent bash ROS env + PYTHONPATH
    # export eder, sonra background job'lar fork edilir → tum subshell'ler ayni env'i
    # (Decision.msg dahil) miras alir.
    entrypoint: bash
    command:
      - -c
      - >-
        set -e;
        source /opt/ros/noetic/setup.bash;
        export PYTHONPATH=/talos-devel/lib/python3/dist-packages:/app:$$PYTHONPATH;
        (rosrun pointcloud_to_laserscan pointcloud_to_laserscan_node cloud_in:=/cart/center_laser/scan scan:=/converted_scan _min_height:=-1.2 _max_height:=1.0 _range_min:=0.45 _range_max:=100.0 &);
        sleep 2;
        (stdbuf -oL python3 -u /app/engel_node_fixed.py &);
        stdbuf -oL python3 -u /app/pointcloud_obstacle_publisher.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # TRAFIK ISARETI ALGILAMA (GPU)
  # =========================================================
  traffic-node:
    image: talos-all:latest
    container_name: traffic-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./fixes/yolov8_ros_node_fixed.py:/app/yolov8_ros_node_fixed.py:ro
      # Levha modeli: İndirilenler'deki yolov10n best.pt (26 sınıf) image içindeki modeli ezer
      - ./levha_tespiti/yolov8_ros/scripts/best.pt:/root/catkin_ws/src/yolov8_ros/scripts/best.pt:ro
      # 'Levha Tespit' cv2 penceresi icin X11 (lane-follower ile ayni kalip)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/yolov8_ros_node_fixed.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # GUVENLI ALAN TESPITI (GPU, prototip)
  # =========================================================
  safe-zone-detector:
    image: talos-all:latest
    container_name: safe-zone-detector
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
    volumes:
      - ./prototip-1/safe_zone_detector.py:/app/safe_zone_detector.py:ro
      - ./prototip-1/best.pt:/app/models/best.pt:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/safe_zone_detector.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # KARAR DUGUMU (Behavior Tree — karar_bt/)
  # Eski fixes/karar.py git'te kalir; geri donus icin sadece bu blogu revert et.
  # talos-all imaji py_trees icerir; ayri karar-bt imaji gerekmez (tek imaj).
  # =========================================================
  karar-node:
    image: talos-all:latest
    container_name: karar-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./karar_bt:/app:ro
      - ./talos_common:/app/talos_common:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && export PYTHONPATH=/talos-devel/lib/python3/dist-packages:/app:$$PYTHONPATH && python3 -u /app/karar_bt_node.py"
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # CAN -> GAZEBO KOPRUSU
  # talos-all:latest kullanir (python-can + rospy)
  # ~/talos-sim/devel mount'u cart_sim.msg icin gerekli
  # =========================================================
  can-bridge:
    image: talos-all:latest
    container_name: talos-can-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages:/app
    volumes:
      - ./hilmi-talos/can_to_talos_cart.py:/app/can_to_talos_cart.py:ro
      - ./hilmi-talos/can_decoder.py:/app/can_decoder.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/can_to_talos_cart.py"
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # GAZEBO -> CAN KOPRUSU
  # =========================================================
  state-bridge:
    image: talos-all:latest
    container_name: talos-state-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages:/app
    volumes:
      - ./hilmi-talos/talos_state_to_can.py:/app/talos_state_to_can.py:ro
      - ./hilmi-talos/can_decoder.py:/app/can_decoder.py:ro
      - ./talos_common:/app/talos_common:ro
      - ./logs:/app/logs
      - ~/talos-sim/devel:/talos-devel:ro
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/talos_state_to_can.py"
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # TALOS KONTROLCU (ana kontrol, build edilebilir)
  # =========================================================
  talos-controller:
    image: talos-all:latest
    container_name: talos-controller
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_IP=127.0.0.1
      - RUN_ID=${RUN_ID:-dev}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./hilmi-talos/control.py:/app/control.py:ro
      - ./hilmi-talos/logs:/app/logs
      - ./talos_common:/app/talos_common:ro
      - ./missions:/missions:ro   # FIX 2 — GOREV_NOKTALARI GeoJSON yükleme
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && cd /app && python3 -u control.py"
    logging: *log-defaults
    restart: "no"

  # =========================================================
  # CAN GORSELLESTIRICI (opsiyonel, --profile gui ile)
  # =========================================================
  can-visualizer:
    profiles: [gui]
    image: talos-all:latest
    container_name: talos-can-visualizer
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-dev}
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages
    volumes:
      - ./hilmi-talos/can_visualizer.py:/app/can_visualizer.py:ro
      - ./hilmi-talos/can_decoder.py:/app/can_decoder.py:ro
      - ~/talos-sim/devel:/talos-devel:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "source /opt/ros/noetic/setup.bash && python3 -u /app/can_visualizer.py"
    logging: *log-defaults
    restart: "no"
