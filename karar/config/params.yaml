# TALOS karar_bt parametreleri.
# Eşikler ve zamanlamalar tek noktada tutulur — sahada hızlı tune için.
#
# ===========================================================================
#  KARAR PARAMETRE ÖZETİ — TÜM KARAR EŞİKLERİ TEK BAKIŞTA
#  (efektif değerler; gerçek anahtarlar aşağıdaki bölümlerde — burası ÖZET)
# ===========================================================================
#  Karar çıktıları: normal | slow | sol | sag | dur | acildurus  → /karar
#  (sol/sag artık YALNIZ levha yön komutu içindir — cone kaçınması §16/E-B ile
#   sol/sag DEĞİL; reroute = 'slow' + /hedef_komut kenar_blok.)
#
#  ENGEL / CONE bantları (engel rotada, ileri mesafe; yakın→uzak):
#    acildurus .... 1.2 m   tam fren, son çare        [wp_near-0.3]
#                   (2026-07-15: YAY-KAPILI — mevcut direksiyonun bisiklet süpürme
#                    bandı dışındaki nesne acil tetiklemez; bkz. obstacle.arc_gate)
#    dur .......... 2.0 m   reroute saptıramazsa dur   [wp_near+0.5]  (güvenlik ağı)
#    reroute ...... 6.0 m   'slow' + kenar_blok talebi [wp_near+4.5]  ← §12.12: 3.5→6.0
#    yavasla ...... 9.0 m   en dış: yaklaş, yavaşla    [wp_near+7.5]  ← §12.12: 6.0→9.0
#    (wp_near = 1.5 m = control.py WP_NEAR_DISTANCE — senkron tut)
#    (hıza-duyarlı: yavasla bandı hız×0.4 sn, +6 m'ye kadar büyür)
#
#  CONE = REROUTE (§16/§12.13 mimari): cone control offset'iyle DEĞİL, planlayıcının
#    (hedef) rotayı dubanın etrafından çizmesiyle geçilir. Karar 6 m'de 'slow' verir
#    + cone'u DÜNYA frame'de kenar_blok ile hedef'e bildirir (control düz takip eder).
#    6 m neden? hedef replan + control tepki payı; golf-cart 1.79 m yanalı güvenle
#    açmak ~5-6 m ister (run 165604, doc §12.12). 3.5 m'de araç engele tıkanıyordu.
#
#  YAYA bantları:        acil 2.0 m · dur 4.0 m · yavas 12.0 m
#  LEVHA:                dur-levhası 3.5 m · okuma 10.0 m · yön-levha 5.0 m
#  CONE REROUTE (/hedef_komut kenar_blok): blok yarıçapı 1.0 m · zaman aşımı 15 s
#                          · tazeleme 1.0 s · serbest-bırakma 5 tick (~0.5 s)
#  DUBA HAFIZASI (dropout köprüsü): konfirme 3 hit + ≤7 m yaklaşma · tut 3 s ·
#                          mutlak tavan 12 s · geçince düş (gövde ileri < -1.5 m)
#                          → detektör kareyi düşürse de duba "orada" sayılır (anti flip-flop)
#  ŞERİT DEĞİŞİMİ (levha):cooldown 4.0 s · manevra-tut 2.0 s (=control LANE_CHANGE_DURATION)
#  ARAÇ GEOMETRİSİ:      wheelbase 1.86 m · max direksiyon 28.95°  (control.py ile eşit)
#  DÖNGÜ:                10 Hz · DUR levhası bekleme 3.0 s · acil mühür çözme 8 tick
#
#  Sahiplik: karar/ = Enes (bu dosya). control_wp_near_m / wheelbase / max_steer
#  control.py ile ELLE aynalı (programatik bağ yok → biri değişirse diğerini güncelle).
# ===========================================================================

tick_hz: 10.0

# Sensor freshness — bu süreden uzun süre veri gelmemişse dal kapanır
freshness:
  yaya_max_age_s:   0.6
  levha_max_age_s:  0.6
  # P1 №5 (inceleme 2026-07-16 E3-O1): 0.4→0.7. /obstacles/poses mesaj periyodu
  # (~0.4 s) eski eşikle ÇAKIŞIYORDU → her mesaj döngüsünde tam 1 tick "bayat"
  # → EngelFresh düşer → tek-tick cruise flicker'ı (churn bölütlerinin 2/3'ü).
  # 0.7 > new_source_max_age_s (0.5) olduğundan 0.4-0.5 s'lik legacy-failover
  # ölü bölgesi de kendiliğinden kapanır.
  engel_max_age_s:  0.7
  lane_max_age_s:   0.8
  odom_max_age_s:   0.5
  hedef_max_age_s:  2.0

# Mesafe eşikleri (metre) — eski karar.py ile uyumlu başlangıç.
# NOT: Yaya ve engel için ayrı acil eşik; eski karar.py yalnız yayaya bakıyordu.
distances:
  yaya_acil_durus_m: 2.0   # eski MESAFE_ACIL_DURUS
  yaya_dur_m:        4.0
  yaya_yavas_m:     12.0
  engel_acil_m:      0.7   # (ARTIK wp_planlama'dan türetiliyor — geri uyum için duruyor)
  engel_block_m:     2.0   # (ARTIK wp_planlama'dan türetiliyor — geri uyum için duruyor)
  engel_yan_clear_m: 3.0   # yan sektörde bu kadar boşluk varsa lane change makul
  levha_dur_m:       3.5
  levha_oku_m:      10.0
  yon_levha_max_m:   5.0

# ---------------------------------------------------------------------------
# WP-tabanlı planlama — control.py WP_NEAR_DISTANCE ± delta (kullanıcı isteği)
# ---------------------------------------------------------------------------
# control.py "varildi/okey" verip bir sonraki WP'ye geçtiği mesafe = WP_NEAR_DISTANCE.
# Karar tüm engel tepki bantlarını bu TEK referansın üzerine ± delta ile türetir;
# böylece karar ile control aynı "aktif waypoint" eşiğini paylaşır.
#   acil    = wp_near + (-0.3) = 1.2 m   (acil durus)
#   dur     = wp_near + ( 0.5) = 2.0 m   (reroute saptıramazsa dur — güvenlik ağı)
#   block   = wp_near + ( 4.5) = 6.0 m   (cone REROUTE commit: slow+kenar_blok — §12.12: 3.5→6.0)
#   yavasla = wp_near + ( 7.5) = 9.0 m   (en dış: yaklaş→yavaşla; commit'in üstünde ~3m slow-zone)
# DİKKAT: control_wp_near_m, control.py WP_NEAR_DISTANCE ile EŞİT TUTULMALI.
wp_planlama:
  control_wp_near_m:     1.5    # = control.py WP_NEAR_DISTANCE (senkron tut!)
  engel_acil_delta_m:   -0.3
  engel_dur_delta_m:     0.5
  engel_block_delta_m:   4.5    # cone REROUTE commit = wp_near+4.5 = 6.0 m (§12.12: golf-cart 1.79m yanal için ~6m gerek)
  engel_yavasla_delta_m: 7.5    # en dış tepki = wp_near+7.5 = 9.0 m (commit'in 3m üstünde slow-zone)
  aktif_wp_histerezis_m: 0.5    # robot wp1'e (wp_near + bu) kadar yaklaştıysa wp1→wp2 segmentine geç
  # NOT: kacis_deadband_m / varsayilan_kacis_yon artık KULLANILMIYOR — sol/sag yön
  #      seçimi (KacisYonuSec) §16/E-B ile kaldırıldı; cone reroute yön istemez.
  #      Geri uyum için bırakıldı (zararsız), bir sonraki temizlikte silinebilir.
  kacis_deadband_m:      0.7    # (DEPRECATED — kullanılmıyor)
  varsayilan_kacis_yon:  sol    # (DEPRECATED — kullanılmıyor)

# ---------------------------------------------------------------------------
# CONE REROUTE — /hedef_komut kenar_blok (§16/§12.13 yeni mimari, E-A/E-B)
# ---------------------------------------------------------------------------
# Karar commit bandında bloklu cone gördüğünde cone'un DÜNYA konumunu sabitler ve
# hedef'e "kenar_blok;-;cx;cy;cone;r" yollar (E-A). hedef o kenarı bloklayıp
# karşı-şeritten rota çizer (Samed: S-A/S-B/S-C). Cone temizlenince "kenar_serbest"
# → hedef restore. Bu blok reroute.py (RerouteManager) tarafından okunur.
# (Eski overtake.py/sollama + Ackermann geri-dönüş KALDIRILDI — cone artık
#  direksiyonla değil rotayla geçiliyor, §12.13 H-A.)
reroute:
  enabled:             true
  block_radius_m:      1.5    # hedef'e bildirilen cone blok yarıçapı (m).
                             # 2026-07-22: 1.0 → 1.5. hedef bunu max(r, BLOK_YARICAP_M=1.0)
                             # ile kullanır → merkez-çizgiden ~1.5m yanaldaki koni de
                             # "rota üstünde" sayılıp bloklanır+reroute edilir. 1.0'da
                             # 1–1.6m yanal koni "rota dışı" sanılıp HİÇ bloklanmıyordu
                             # (hedef bloklu_kenar=0) → araç koniye ~1m dayanıp acil-duruş
                             # + statik-dur flip-flop (canlı 20260722T194924Z: 92 recalc'ın
                             # 67'si). Koridor payı = araç gövde yarı-gen ~0.75m'e yakın;
                             # karşı şerit (~2m) hâlâ ayrımda. Büyütürsen daha erken reroute
                             # ama yoğun koni kümesinde fazla kenar silip fallback riski artar.
  max_s:              15.0    # reroute zaman aşımı → fallback kenar_serbest (susmasın)
  refresh_s:           1.0    # aktif kenar_blok'u bu periyotla tazele (geç abone yakalasın)
  release_clear_ticks: 5      # cone N tick (~0.5s @10Hz) bloklamıyorsa → kenar_serbest

# ---------------------------------------------------------------------------
# LEVHA YÖN-KISITI — dönülmez/mecburi/giriş-yok levhaları → /hedef_komut kenar_blok
# ---------------------------------------------------------------------------
# "Sola dönülmez" gibi levhalar karar çıkışı değil ROTA kısıtıdır: levha_kisit.py
# levhayı dünya-frame'de çapalar ve kavşağın YASAK koluna kenar_blok bırakır
# (hedef'te SOFT toplamsal ceza) → D* öbür kolu seçer. Kavşak geçilince serbest.
# Tablo (levha_kisit.YASAK_YERLESIM): SOLA_DONULMEZ→sol · SAGA_DONULMEZ→sag ·
# ILERI_MECBURI_YON→sol+sag · GIRISI_OLMAYAN_YOL→ileri. Levha adları algi/levha
# passthrough'unun ham YOLO sınıf adlarıdır (SINIF_ESLESTIRME dışı kalanlar).
levha_kisit:
  enabled:         true
  etki_m:          15.0   # levha bu ileri mesafeden yakınsa çapalanır
  min_hits:        3      # üst üste bu kadar tick görülmeden kısıt açılmaz (misdetect freni)
  hit_gap_s:       0.5    # hit sayacı bu süreden uzun kesintide sıfırlanır
  ileri_ofset_m:   4.0    # levha çapası → kavşak merkezi (levha kavşaktan önce dikilir)
  yan_ofset_m:     5.0    # kavşak merkezi → yasak kol girişi (yanal)
  block_radius_m:  2.5    # blok yarıçapı; yan_ofset - r düz şeridi sıyırmamalı (2.5m marj)
  refresh_s:       1.0    # aktif blokları tazeleme periyodu (hedef BLOK_TTL_S=3s beslenir)
  pass_behind_m:   8.0    # çapa bu kadar geride kalınca kısıt biter (> ileri_ofset_m TUT)
  max_s:           45.0   # mutlak tavan — kırmızıda beklerken düşmesin diye uzun

# Ackermann araç geometrisi (control.py ile EŞİT TUTULMALI)
ackermann:
  wheelbase_m:   1.86      # = control.py WHEELBASE
  max_steer_deg: 28.95     # = control.py MAX_STEER_ANGLE (ackermann.py max_bicycle_angle())

# Hıza-duyarlı tepki mesafesi.
# efektif_esik = taban_esik + gain_s * hiz_mps  (max_extra_m ile sınırlı)
# gain_s ≈ "ileriye bakış / reaksiyon süresi" (saniye): bu kadar saniyelik
# yolu eşiğe ekler. Odom bayatsa veya hız 0 ise eşik tabanda kalır (güvenli).
speed_adaptive:
  enabled: true
  yaya_dur_gain_s:    0.5   # tam duruş eşiği büyümesi
  yaya_yavas_gain_s:  0.8   # yavaşlama eşiği büyümesi
  engel_block_gain_s: 0.4   # engel blokaj eşiği büyümesi
  max_extra_m:        6.0   # hız katkısının üst sınırı

# Trafik ışığı davranışı — birleşik FSM (TrafikIsigiFSM): KIRMIZI/SARI/YEŞİL
traffic_light:
  # YAKLAŞMA sarısı (kırmızısız görülen sarı) aksiyonu: "slow" (varsayılan) | "dur".
  # KTR §7.5.5 "kırmızı veya sarı → tam dur" için "dur" yapılabilir. NOT: kırmızıdan
  # SONRA görülen sarı bundan BAĞIMSIZDIR → her zaman 'slow' (yeşile yavaştan hazırlan).
  yellow_action: slow
  # IŞIK TEPKİ MESAFESİ (2026-07-23 saha bulgusu): trafik ışığı FSM'i bu mesafe
  # içinde çalışır. AYRI tutulur çünkü ışık, DUR/yön levhalarından ÇOK daha uzakta
  # aksiyon ister: saha ZED2 kaydında gerçek kırmızı ışık bbox-proxy ile 33–40 m'de
  # görülüyordu; eski değer (levha_oku_m=10 m) yüzünden ışık FSM'i HİÇ tetiklenmiyordu
  # (araç kırmızıya tepki vermeden geçerdi). 40 m: kırmızıya ~35 m'de 'dur' başlar,
  # yeşilde bırakır. UYARI: monoküler MESAFE_K/bbox_h proxy'si yakını ölçemiyor
  # (~14–33 m'de doyuyor) → gerçek çözüm ZED derinliği; bu değer köprü. Sahada tune et.
  isik_oku_m: 40.0
  # Işık release grace'i (2026-07-23): KIRMIZI → YEŞİLE kadar 'dur' (zaman-sınırı
  # yok); SARI → 'slow'. Son aksiyon-alan ışık bu süre boyunca TUTULUR → kısa algı
  # flicker'ı (levha 1-tick NONE) kararı bozmaz (kırmızıda öne seğirme / sarıda gaz
  # kesme yok). Model 'lamba_yesil' veriyorsa yeşilde release anındadır; vermiyorsa
  # ışık bu süre boyunca hiç görülmeyince 'geçildi' sayılıp geçilir. Sahada tune et.
  kirmizi_release_grace_s: 2.0

# Zamanlayıcılar
timers:
  dur_levhasi_bekleme_s:    3.0
  dur_levhasi_release_grace_s: 1.5  # bekleme bitti, levha hâlâ yakın → bu süre içinde release
  # Engel DUR→REROUTE→DEVAM: engel commit bandına girince bu kadar sn GERÇEK 'dur'
  # (planlayıcı replan yapsın), sonra 'slow' ile reroute takibi. 0 → duraklamasız
  # (eski davranış: doğrudan slow+reroute). Sahada tune edilebilir.
  engel_dur_reroute_pause_s: 1.5
  # TEK-SEFERLİK DUR (2026-07-22 karar-kararsızlığı fix): RerouteKarar fazı bu
  # süreden UZUN boşlukta sıfırlanır (= yeni karşılaşma → tekrar DUR). Eski 0.5s
  # değeri tünel duvarı/duba detektör titremesinde her titreşimi "yeni karşılaşma"
  # sayıp tekrarlı 1.5s DUR bastırıyordu (canlı 160358Z: 382 engel_dur_reroute →
  # araç kilitli). 3s: kısa boşluk fazı KORUR, engel dönünce doğrudan 'slow' takip;
  # DUR yalnız gerçekten yeni engelde. (debounce.engel_blokaj_hold_ticks ile eş.)
  engel_reroute_reset_gap_s: 3.0

# Yaya geçidi FSM (2026-07-22) — YayaGecidiFSM okur.
# Adanmış model yalnız GEÇİT ÇİZGİSİNİ ('crosswalk') veriyor, yayanın kendisini
# ('object') değil → geçit görülünce yaya olsun olmasın MİNİMAL zorunlu duruş;
# sonra "geçitte yaya var mı" LİDAR engeliyle yanıtlanır (engel varsa max'a dek
# bekle, yoksa min dolunca devam). Görüntü-işleme 'object' sınıfını çözünce burası
# gerçek yaya tespitine daraltılır (engel_bekle_m kalkar). Duruş/yavaş eşikleri
# distances.yaya_dur_m / yaya_yavas_m'den gelir.
yaya_gecidi:
  min_bekleme_s:   3.0    # geçitte ZORUNLU minimal duruş (yaya olsun olmasın)
  max_bekleme_s:  20.0    # engel(yaya) sürerse üst sınır → kalıcı kilit keser (fail-safe)
  engel_bekle_m:   8.0    # merkez lidar engeli bu mesafe içindeyse "geçitte yaya var" say
  release_grace_s: 8.0    # devam sonrası: aynı geçidi (araç hâlâ üstündeyken) yeniden tetikleme

  # --- Levha ÖN-KAPISI (2026-07-23) — YayaLevhaKapisi okur ---
  # Adanmış çizgi modeli (/yaya_gecidi/model) geçit çizgisini ŞERİTLE karıştırabiliyor.
  # Bu yüzden karar çizgi modeline YALNIZ yaya geçidi LEVHASI görülünce güvenir:
  # levha modelinin yaya_gecidi sınıfı /yaya_gecidi'de gelir → kapı açılır. Kapı,
  # çizgi FSM release olunca VEYA levha geçilince (dünya-çapası) kapanır.
  levha_kapisi_enabled: true   # false → eski davranış (çizgiye hep güven, kapı yok)
  levha_topic: "/yaya_gecidi"  # levha modelinin yaya_gecidi çıkışı (adanmış /yaya_gecidi/model'DEN farklı)
  levha_max_age_s:   0.6       # levha tazelik (freshness.levha_max_age_s aynası)
  # ARM MESAFESİ (2026-07-23 saha bulgusu, 12:04 kaydı): geçit tabelası GEÇİDİ UZAKTAN
  # DUYURUR — bbox-proxy ile 41–49 m'de görülüyordu; eski 10 m yüzünden kapı HİÇ açılmadı
  # ve araç gerçek zebradan geçti. Tabelayı gördüğünde arm et (trafik ışığı isik_oku_m=40
  # ile aynı mantık); DURUŞ mesafesini yaya_dur_m/yaya_yavas_m (çizgi FSM) belirler, bu değil.
  levha_arm_menzil_m: 45.0     # tabela bu ileri mesafe içinde görülünce kapı açılır (geçit duyurusu)
  levha_pass_behind_m: 3.0     # levha çapası bu kadar GERİDE kalınca kapı kapanır (geçildi)
  levha_arm_max_s:   45.0      # fail-safe: kapı en fazla bu kadar açık (uzaktan arm → geçide varış payı)
  levha_kapi_grace_s: 5.0      # kapandıktan sonra yeniden silahlanma bekleme (flip-flop önler)

# Debounce — flicker önleme (tick cinsinden, 10Hz @ 0.1s/tick varsayar)
debounce:
  yaya_min_consecutive:     2
  engel_min_consecutive:    2
  levha_min_consecutive:    2
  # YAPIŞKAN ENGEL-KAPISI / çıkış histerezisi (2026-07-22 karar-kararsızlığı fix):
  # engel merkez bandda bir kez angaje olunca, kısa algı boşluklarında (detektör
  # titremesi, /obstacles/poses bir tick boş) engel dalı DÜŞMESİN → karar 'normal'e
  # flip-flop yapmasın. Angaje kararı bu kadar tick (10Hz'de 15 ≈ 1.5s) tutar; her
  # gerçek algı tutmayı tazeler. 0 → eski davranış (histerezis yok). Güvenli yön:
  # yalnız temkinli 'slow'/'dur'u UZATIR; dur/acildurus zaten üst dallardan gelir.
  engel_blokaj_hold_ticks:  15
  # P1 №6 (E3-O2): yayın-öncesi ASİMETRİK çıkış-debounce. Yükselen karar
  # (slow→dur, →acildurus) ANINDA geçer; alçalan karar (dur→normal) ancak bu
  # kadar tick üst üste istikrarlıysa geçer (0 = kapalı). bkz. cikis_debounce.py
  cikis_debounce_ticks:     3

# Churn anomali dedektörü (kayan pencere; rapor Ek A KARAR_CHURN eşiğiyle aynı).
# Debounce SONRASI yayınlanan değişimleri sayar → events.jsonl 'anomali_karar_churn'
# + talos_common WARN + rospy.logwarn (pencere başına en çok bir uyarı).
anomali:
  churn_pencere_s: 10.0
  churn_esik:      5

# Emergency latch
emergency:
  release_clear_ticks: 8   # ÖLÇÜLÜ temizlik (engel var ama d_arc ≥ eşik): 8 tick (~0.8s)
  # P1 №7 (E5-O3): "temiz"in kaynağı ayrıldı. YOKLUK temizliği (engel_present=0,
  # yani detektör dropout'u da olabilir) için ayrı, daha uzun eşik — 20260716
  # vakasında 6.6-7 s'lik dropout mührü YANLIŞ anda çözdü, araç koniye ilerledi,
  # yeniden mühürlendi. Ölçülü temizlik (gerçek d_arc kanıtı) 8 tick'te kalır.
  release_yokluk_ticks: 20  # yokluk-temizliği: 20 tick (~2s) kesintisiz "engel yok" ister
  # ---------------------------------------------------------------------
  # Statik-durum çözme yolu (P0 №3, inceleme 2026-07-16 E8-R1)
  # ---------------------------------------------------------------------
  # Bırakma eşiği (d_arc ≥ engel_acil×1.5 = 1.8 m) STATİK yakın engelde
  # (gözlenen 1.1-1.35 m) araç kımıldayamadığı için sağlanamıyordu → kalıcı
  # acildurus kilidi (9 koşunun 5'i, sürenin ~%50'si). Koşullar sağlanınca
  # mühür AÇIK KALIR (anında yeniden-mühür döngüsü yok) ama karar 'dur'a
  # iner (reason: muhur_statik_dur) → control'ün reason-filtreli DUR-kaçışı
  # (control.py DUR_KACIS_*) aracı geri çeker. control tarafındaki P0 №1
  # OLMADAN tek başına anlamsızdır (araç dur'da da kımıldamaz, ama en
  # azından %100 yerine %80 fren + izlenebilir reason üretir).
  statik_cozme:
    enabled:           true
    min_muhur_s:       15.0   # mühür en az bu süredir kapalı olmalı
    max_speed_kmh:     0.3    # araç fiilen hareketsiz (odom taze şart)
    d_arc_sabit_ticks: 30     # d_arc bu kadar ardışık tick (~3 s @10Hz) tolerans içinde
    d_arc_sabit_tol_m: 0.4    # sabitlik toleransı (duran araçta ölçüm jitter'ı ±0.2-0.4 m)
    d_arc_min_m:       1.0    # güvenli taban: bunun altında (burun buruna) iniş YOK

# Engel kaynağı — iki arayüz desteklenir, otomatik failover ile:
#   1) YENI: talos_obstacle_detector → /obstacles/poses (geometry_msgs/PoseArray)
#            DBSCAN + PCA OBB engel konumları. Varsa BT bunu kullanır.
#   2) ESKI: engel_node_fixed.py → /engel,/engel_distance,/engel_angle,
#            /engel_sol_mesafe,/engel_sag_mesafe (skaler). Yeni kaynak yoksa bu.
# source: "auto" (yeni varsa onu, yoksa eskiyi) | "legacy" | "poses"
obstacle:
  source: auto
  new_source_max_age_s: 0.5     # /obstacles/poses bu süre içinde geldiyse "aktif" → skaler topic'ler yok sayılır
  corridor_half_width_m: 1.0    # araç koridoru yarı genişliği (merkez sektör eşiği)
  forward_min_m: 0.0            # bu değerden ileri engeller sayılır (önümüz)
  forward_max_m: 30.0           # merkez/açı için ileri bakış sınırı (m)
  side_forward_max_m: 8.0       # yan sektör (lane-change güvenliği) ileri sınırı (m)
  # PoseArray eksen eşlemesi (sensör frame → araç gövdesi). Sim'de velodyne
  # genelde REP-103: x ileri, y sol. Sensör farklıysa burada düzelt.
  axis_forward: x               # x | y | z  → "ileri" hangi eksen
  axis_left: y                  # x | y | z  → "sol" hangi eksen
  invert_forward: false
  invert_left: false

  # Yay-kapısı (2026-07-15) — ACİL bandı bisiklet-modeli farkındalı.
  # Canlı bulgu (run 20260713T173335Z): 41° sağ-yanda 1.12 m'deki bordür,
  # araç sola dönerken düz-koridor eşiğini kırıp acildurus'u 2 dk kilitledi.
  # Artık acil tetik/release, mevcut direksiyonun 2B süpürme bandı (control.py
  # ackermann_path_clears ile aynı matematik) içindeki en yakın engele (d_arc)
  # bakar. dur/reroute/yavasla bantları d_center ile DEĞİŞMEDİ (planlama erken
  # görmeli). Direksiyon verisi yok/bayat → d_arc=d_center (eski davranış).
  arc_gate:
    enabled: true
    steer_topic: "/cart"        # cart_control (steer ∈ [-1,1], + sol). Bee1'de değişecek.
    steer_full_deg: 28.95       # steer=1 karşılığı bisiklet açısı (urdf max_steer 0.5053 rad)
    steer_max_age_s: 0.5        # direksiyon bundan bayatsa kapı devre dışı (fail-safe)
    wheelbase_m: 1.86           # control.py WHEELBASE ile eşit tut
    half_width_m: 0.75          # control.py ESTOP_BANT_YARIM_M ile eşit tut (0.6+0.15)
    sensor_to_ra_m: 1.76        # control.py LIDAR_ARKA_AKS_M ile eşit tut
    nose_m: 2.34                # arka aks → ön tampon (golf.urdf: 1.477+0.862)

  # Duba DÜNYA-konum hafızası (dropout köprüsü) — obstacle_memory.py
  # Detektör duba ~3m önümüzdeyken bile kareyi düşürünce engel_d_center boşalıyor
  # → reroute flip-flop ("cone_temiz" her ~1s, karar bir kez cruise'a düştü; canlı
  # teşhis manuel_103648Z, 2026-06-26). Hafıza: konfirme dubayı (yeterli hit +
  # yaklaşıldı) gövde-frame'e geri-projekte edip füzyona enjekte eder → "lidar veri
  # vermese bile o duba orada". Geçilince/timeout'ta düşer (doğal serbest bırakma).
  memory:
    enabled: true
    assoc_radius_m:        1.5   # canlı nokta bu kadar yakınsa aynı duba (iz)
    confirm_hits:          3     # bu kadar tick eşleşince (+yaklaşma) konfirme (~0.3s @10Hz)
    confirm_approach_m:    9.0   # iz en az bir kez bu menzile girmiş olmalı ("yaklaştı"); =yavasla
                                 #   bandı → reroute(6m)'den ÖNCE konfirme (ani-beliren dubada marj)
    memory_ttl_s:          3.0   # konfirme iz canlı algı olmadan bu kadar tutulur
    unconfirmed_ttl_s:     0.8   # konfirme olmamış iz bu süre algılanmazsa düşer (FP temizliği)
    max_memory_s:         12.0   # mutlak tavan — YALNIZ hafızayla tutulan ize (canlı izi düşürmez)
    inject_forward_min_m:  0.3   # yalnız bu kadar ÖNDE iz enjekte edilir
    hold_forward_max_m:   14.0   # bu menzilden uzak iz enjekte edilmez
    pass_behind_m:         1.5   # gövde ileri < -bu → araç geçti → iz düşer (Bee1 ~2.5m boy)
    pos_alpha:             0.4   # dünya konumu EMA katsayısı (yeni gözleme doğru)
    max_tracks:           12     # iz sayısı tavanı (önce konfirme-olmayanı at)
    max_pose_jump_m:       2.0   # araç pozu bir tick'te bundan fazla atlarsa (odom reset) → hafıza sıfırla

# Lane change guard'ları (sadece BT içinde; control.py kendi guard'ını ayrı uygular)
lane_change:
  enabled: true
  cooldown_s: 4.0           # ardışık lane change arası bekleme
  # control.py şerit değişimini kenar-tetiklemeli başlatıp LANE_CHANGE_DURATION
  # süresince kendi sürer. BT bu süre boyunca aynı yön komutunu tutar (yoksa
  # "dur"/"normal" manevrayı keser). control.py LANE_CHANGE_DURATION ile eşit tut.
  maneuver_hold_s: 2.0

# Snapshot/debug
debug:
  publish_snapshot: true
  snapshot_rate_hz: 2.0
  ascii_tree_log_every_n_tick: 50  # 0 = kapalı
