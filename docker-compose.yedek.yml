# TALOS YEDEK (kendi kendine yeten) COMPOSE — talos-yedek:latest imajıyla çalışır
# ==============================================================================
# ACİL DURUM MODU: host'ta kod ağacı GEREKMEZ. Kod + devel + missions + maps
# imaja gömülüdür (Dockerfile.yedek). Her servis, base docker-compose.yml'ın
# bind-mount'la /app'e koyduğu dosyaları başlangıçta /talos-kod'dan KOPYALAR ve
# base ile AYNI komutu çalıştırır.
#
# Kullanım (host'ta yalnız docker + roscore + vcan0 gerekir):
#   docker load -i talos-yedek-imaj_<tarih>.tar.gz
#   docker compose -f docker-compose.yedek.yml --profile gui up -d
#   # GERÇEK ARAÇ: state-bridge'siz + beemobs köprüsü:
#   docker compose -f docker-compose.yedek.yml -f docker-compose.yedek-beemobs.yml \
#       --profile gui up -d $(docker compose -f docker-compose.yedek.yml -f docker-compose.yedek-beemobs.yml --profile gui config --services | grep -v '^state-bridge$')
#
# Bu dosya host'ta yoksa imajdan çıkar:
#   docker run --rm talos-yedek:latest cat /talos-kod/docker-compose.yedek.yml > docker-compose.yedek.yml
#
# KISIT: kod imaj build anındaki halidir — canlı düzenleme/canli_params.yaml
# düzenlemesi bu modda UYGULANMAZ (config imaj içi kopyadır). Normal geliştirme
# için mount modeline dön (docker-compose.yml + baslat.sh).
# Loglar ./logs'a yazılır (tek host mount'u — veri, kod değil).

x-log-defaults: &log-defaults
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  konum-server:
    image: talos-yedek:latest
    container_name: konum-server
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-yedek}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./logs:/app/logs
    entrypoint: bash
    command: -c "cp /talos-kod/konum/konum.py /app/ && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && export PYTHONPATH=/app:$$PYTHONPATH && python3 -u /app/konum.py"
    logging: *log-defaults
    restart: "on-failure:5"

  talos-map-server:
    image: talos-yedek:latest
    container_name: talos-map-server
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-yedek}
    entrypoint: bash
    command: -c "cp /talos-kod/maps/my_map.yaml /talos-kod/maps/my_map.pgm /talos-kod/maps/final_graph.yaml /talos-kod/maps/waypoint_pub.py /app/ && source /opt/ros/noetic/setup.bash && (rosrun map_server map_server /app/my_map.yaml &) && sleep 2 && python3 -u /app/waypoint_pub.py"
    logging: *log-defaults
    restart: "on-failure:5"

  hedef-teslimi:
    image: talos-yedek:latest
    container_name: hedef_teslimi
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-yedek}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./logs:/app/logs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "cp /talos-kod/hedef/hedef_yoneticisi.py /talos-kod/hedef/hedef_logger.py /app/ && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/hedef_yoneticisi.py"
    logging: *log-defaults
    restart: "on-failure:5"

  engel-node:
    image: talos-yedek:latest
    container_name: engel-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - RUN_ID=${RUN_ID:-yedek}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./logs:/app/logs
    entrypoint: bash
    # base ile aynı akış; öncesinde kod /talos-kod'dan kopyalanır. '>-' bloğuna
    # '#' yorum koyma (tek satıra iner, gerisini yorumlar).
    command:
      - -c
      - >-
        set -e;
        cp /talos-kod/lidar/engel_node_fixed.py /talos-kod/lidar/pointcloud_obstacle_publisher.py /app/;
        cp -a /talos-kod/talos_common /talos-kod/config /app/;
        source /opt/ros/noetic/setup.bash;
        export PYTHONPATH=/talos-devel/lib/python3/dist-packages:/app:$$PYTHONPATH;
        (rosrun pointcloud_to_laserscan pointcloud_to_laserscan_node cloud_in:=/cart/center_laser/scan scan:=/converted_scan _min_height:=-0.7 _max_height:=1.0 _range_min:=0.45 _range_max:=100.0 &);
        sleep 2;
        (stdbuf -oL python3 -u /app/engel_node_fixed.py &);
        stdbuf -oL python3 -u /app/pointcloud_obstacle_publisher.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "on-failure:5"

  traffic-node:
    image: talos-yedek:latest
    container_name: traffic-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-yedek}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "cp /talos-kod/algi/levha/yolov8_ros_node_fixed.py /app/ && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/yolov8_ros_node_fixed.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "on-failure:5"

  park-durak-node:
    image: talos-yedek:latest
    container_name: park-durak-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-yedek}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "cp /talos-kod/algi/park_durak/park_durak_node.py /app/ && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/park_durak_node.py"
    logging: *log-defaults
    restart: "on-failure:5"

  lane-follower:
    image: talos-yedek:latest
    container_name: lane-follower
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-yedek}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "cp /talos-kod/algi/serit/lane_follow_node_fixed.py /app/lane_follow_node.py && mkdir -p /app/models && cp /talos-kod/algi/serit/models/best.pt /app/models/best.pt && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/lane_follow_node.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *log-defaults
    restart: "on-failure:5"

  yaya-gecidi-node:
    image: talos-yedek:latest
    container_name: yaya-gecidi-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-yedek}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "cp /talos-kod/algi/yaya_gecidi/yaya_gecidi_node.py /app/ && mkdir -p /app/models && cp /talos-kod/algi/yaya_gecidi/best.pt /app/models/best.pt && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/yaya_gecidi_node.py"
    logging: *log-defaults
    restart: "on-failure:5"

  karar-node:
    image: talos-yedek:latest
    container_name: karar-node
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-yedek}
      - TALOS_LOG_ROOT=/app/logs
    volumes:
      - ./logs:/app/logs
    entrypoint: bash
    command: -c "cp -a /talos-kod/karar/. /app/ && cp -a /talos-kod/talos_common /app/ && source /opt/ros/noetic/setup.bash && export PYTHONPATH=/talos-devel/lib/python3/dist-packages:/app:$$PYTHONPATH && python3 -u /app/karar_bt_node.py"
    logging: *log-defaults
    restart: "on-failure:5"

  can-bridge:
    image: talos-yedek:latest
    container_name: talos-can-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-yedek}
      - TALOS_LOG_ROOT=/app/logs
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages:/app
      - TALOS_POWER_LIMIT=${TALOS_POWER_LIMIT:-1.0}
      - TALOS_POWER_LIMIT_AUTO=${TALOS_POWER_LIMIT_AUTO:-1.0}
      - TALOS_RAMP_UP=${TALOS_RAMP_UP:-0.02}
      - TALOS_RAMP_DOWN=${TALOS_RAMP_DOWN:-0.05}
    volumes:
      - ./logs:/app/logs
    entrypoint: bash
    command: -c "cp /talos-kod/control/can_to_talos_cart.py /talos-kod/control/can_decoder.py /app/ && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/can_to_talos_cart.py"
    logging: *log-defaults
    restart: "on-failure:5"

  # SADECE SİM (Gazebo->CAN). Gerçek araçta BAŞLATMA (bkz. yedek-beemobs override başlığı).
  state-bridge:
    image: talos-yedek:latest
    container_name: talos-state-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - RUN_ID=${RUN_ID:-yedek}
      - TALOS_LOG_ROOT=/app/logs
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages:/app
    volumes:
      - ./logs:/app/logs
    entrypoint: bash
    command: -c "cp /talos-kod/control/talos_state_to_can.py /talos-kod/control/can_decoder.py /app/ && cp -a /talos-kod/talos_common /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/talos_state_to_can.py"
    logging: *log-defaults
    restart: "on-failure:5"

  talos-controller:
    image: talos-yedek:latest
    container_name: talos-controller
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - RUN_ID=${RUN_ID:-yedek}
      - TALOS_LOG_ROOT=/app/logs
      - TALOS_BUS_RELEASE_ON_START=${TALOS_BUS_RELEASE_ON_START:-0}
    volumes:
      - ./logs:/app/logs
    entrypoint: bash
    command: -c "cp /talos-kod/control/control.py /talos-kod/control/ackermann.py /app/ && cp -a /talos-kod/talos_common /talos-kod/config /app/ && source /opt/ros/noetic/setup.bash && export PYTHONPATH=/talos-devel/lib/python3/dist-packages:$$PYTHONPATH && cd /app && python3 -u control.py"
    logging: *log-defaults
    restart: "on-failure:5"

  can-visualizer:
    profiles: [gui]
    image: talos-yedek:latest
    container_name: talos-can-visualizer
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - DISPLAY=${DISPLAY}
      - RUN_ID=${RUN_ID:-yedek}
      - PYTHONPATH=/opt/ros/noetic/lib/python3/dist-packages:/talos-devel/lib/python3/dist-packages
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: bash
    command: -c "cp /talos-kod/control/can_visualizer.py /talos-kod/control/can_decoder.py /app/ && source /opt/ros/noetic/setup.bash && python3 -u /app/can_visualizer.py"
    logging: *log-defaults
    restart: "on-failure:5"
