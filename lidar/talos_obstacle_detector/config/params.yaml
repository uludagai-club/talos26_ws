# talos_obstacle_detector - DBSCAN + PCA OBB parametreleri
# Girdi: /cart/points_noground (Patchwork++ zemin ayiklamasi ciktisi)

input_topic: "/cart/points_noground"

# --- DBSCAN ---
eps: 0.5            # arama yaricapi epsilon (m). Buyutursen ayri engeller birlesir.
min_pts: 5          # cekirdek nokta esigi (MinPts). Buyutursen gurultu daha cok elenir.

# --- kume kabul filtreleri ---
min_cluster_size: 10     # bu sayidan az noktali kumeler atilir
max_cluster_size: 25000
max_extent_xy: 15.0      # XY'de bu boyutu asan kutular elenir (duvar/bariyer eler)
max_height: 6.0          # Z'de bu yuksekligi asan kutular elenir

# --- OBB modeli ---
# true  -> Z dik tutulur, yaw PCA'dan (zemin engelleri icin onerilen, en kararli)
# false -> tam 3B PCA (dokumandaki ham hali; kutular egilebilir)
vertical_box: true

# --- tracker (zamansal kararlilik: kutularin "git gel" yapmasini engeller) ---
track_enable: true     # false -> ham kare-kare tespit (yumusatma yok)
assoc_dist: 1.5        # ardisik karelerde ayni engel say. icin maks merkez mesafesi (m)
pos_alpha: 0.5         # pozisyon yumusatma (0=donuk/cok kararli, 1=ham/tepkili)
dim_alpha: 0.3         # boyut yumusatma
yaw_alpha: 0.3         # yonelim yumusatma (eksen sicramasi bu sayede sonumlenir)
min_hits: 2            # bir engel gosterilmeden once gereken toplam kare (yanip sonmeyi keser)
max_misses: 5          # engel kaybolunca kac kare daha canli tutulsun (kisa kopmalari koprular)
