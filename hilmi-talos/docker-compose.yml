services:
  talos-control:
    build: .
    image: talos-control:latest
    container_name: talos-controller
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_IP=127.0.0.1
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
