version: '3.8'

services:
  waypoint-follower:
    build: .
    container_name: talos-waypoint
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=http://localhost:11311
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    command: python3 can_waypoint_follower.py
    restart: unless-stopped

  can-bridge:
    build: .
    container_name: talos-can-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=http://localhost:11311
    command: python3 can_to_talos_cart.py
    restart: unless-stopped

  state-bridge:
    build: .
    container_name: talos-state-bridge
    network_mode: host
    privileged: true
    environment:
      - ROS_MASTER_URI=http://localhost:11311
    command: python3 talos_state_to_can.py
    restart: unless-stopped
